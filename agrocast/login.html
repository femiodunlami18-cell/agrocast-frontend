<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroCast | Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="hero-wrapper">
        <div class="login-card">
            <div class="brand-badge"><i class="fas fa-leaf fa-2x"></i></div>
            <h2>Welcome Back</h2>
            <p class="subtitle">Login to your AgroCast account</p>

            <div class="input-group">
                <label>Username</label>
                <input type="text" id="loginUser" placeholder="e.g. johndoe">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="loginPass" placeholder="Enter your password">
            </div>

            <button id="loginBtn">Login</button>
            <p style="text-align: center; margin-top: 20px; font-size: 0.9rem; color: var(--text-light);">
                Don't have an account? <a href="./register.html"
                    style="color: var(--primary); font-weight: 600; text-decoration: none;">Register here</a>
            </p>
        </div>
    </div>
    <script src="./config.js"></script>
    <script src="./app.js"></script>
</body>

</html>
