<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#059669">
    <title>AgroCast | Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
</head>

<body class="app-page">
    <nav class="navbar">
        <div class="nav-brand"><i class="fas fa-leaf"></i> AgroCast</div>
        <div style="font-weight:700; color:var(--text-bold);">Profile</div>
    </nav>

    <div class="dashboard-container">
        <div class="card profile-card" style="padding: 0; overflow: hidden;">
            <div class="profile-banner"></div>

            <div style="padding: 0 30px 40px; margin-top: -40px;">
                <div class="brand-badge"
                    style="width: 80px; height: 80px; border-radius: 50%; box-shadow: 0 8px 16px rgba(0,0,0,0.1); background: white;">
                    <i class="fas fa-user fa-2x" style="color: var(--primary);"></i>
                </div>
                <h2 id="profName" style="margin-top: 15px;">---</h2>
                <p id="profEmail" style="color: var(--text-light); font-weight: 500; margin-top: -5px;">
                    email@example.com</p>

                <div class="profile-details"
                    style="text-align: left; background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(8px); border: 1px solid rgba(16, 185, 129, 0.15); box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.5);">
                    <p><strong><span
                                style="background: var(--bg-light); padding: 8px; border-radius: 8px; display: inline-flex;"><i
                                    class="fas fa-user-tag"></i></span> Username:</strong> <span id="profUsername"
                            style="margin-left: auto; font-weight: 600;">---</span></p>
                    <p style="margin-top: 10px;"><strong><span
                                style="background: var(--bg-light); padding: 8px; border-radius: 8px; display: inline-flex;"><i
                                    class="fas fa-phone"></i></span> Phone:</strong> <span id="profPhone"
                            style="margin-left: auto; font-weight: 600;">---</span></p>
                </div>

                <button id="logoutBtn"
                    style="border-radius: 50px; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; width: 80%; margin: 30px auto 0; display: block;">
                    Log Out Securely <i class="fas fa-sign-out-alt" style="margin-left: 8px;"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <i class="fas fa-house-chimney"></i><span>Overview</span>
        </a>
        <a href="farm.html" class="nav-item">
            <i class="fas fa-tractor"></i><span>Farms</span>
        </a>
        <a href="logs.html" class="nav-item">
            <i class="fas fa-clipboard-list"></i><span>Logs</span>
        </a>
        <a href="profile.html" class="nav-item active">
            <i class="fas fa-user-circle"></i><span>Profile</span>
        </a>
    </div>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
</body>

</html>
