<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#059669">
    <title>AgroCast | Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
</head>

<body class="app-page">
    <nav class="navbar">
        <div class="nav-brand"><i class="fas fa-leaf"></i> AgroCast</div>
        <div style="font-weight:700; color:var(--text-bold);">Profile</div>
    </nav>

    <div class="dashboard-container">
        <div class="card profile-card" style="padding: 0; overflow: hidden;">
            <div class="profile-banner"></div>

            <div style="padding: 0 30px 40px; margin-top: -40px;">
                <div class="brand-badge"
                    style="width: 80px; height: 80px; border-radius: 50%; box-shadow: 0 8px 16px rgba(0,0,0,0.1); background: white;">
                    <i class="fas fa-user fa-2x" style="color: var(--primary);"></i>
                </div>
                <h2 id="profName" style="margin-top: 15px;">---</h2>
                <p id="profEmail" style="color: var(--text-light); font-weight: 500; margin-top: -5px;">
                    email@example.com</p>

                <div class="profile-details"
                    style="text-align: left; background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(8px); border: 1px solid rgba(16, 185, 129, 0.15); box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.5);">
                    <p><strong><span
                                style="background: var(--bg-light); padding: 8px; border-radius: 8px; display: inline-flex;"><i
                                    class="fas fa-user-tag"></i></span> Username:</strong> <span id="profUsername"
                            style="margin-left: auto; font-weight: 600;">---</span></p>
                    <p style="margin-top: 10px;"><strong><span
                                style="background: var(--bg-light); padding: 8px; border-radius: 8px; display: inline-flex;"><i
                                    class="fas fa-phone"></i></span> Phone:</strong> <span id="profPhone"
                            style="margin-left: auto; font-weight: 600;">---</span></p>
                </div>

                <div class="profile-actions" style="margin-top: 20px; display: flex; flex-direction: column; gap: 10px;">
                    <button id="editProfileBtn" class="btn btn-outline" style="border-radius: 12px; width: 100%;">
                        <i class="fas fa-user-edit"></i> Edit Profile
                    </button>
                    <button id="resendVerificationBtn" class="btn btn-primary" style="border-radius: 12px; width: 100%;">
                        <i class="fas fa-envelope"></i> Resend Verification Email
                    </button>
                    <button id="ussdSimulatorBtn" class="btn btn-primary" style="background-color: var(--secondary); border-radius: 12px; width: 100%;">
                        <i class="fas fa-mobile-alt"></i> Simulate USSD
                    </button>
                    <button id="deactivateBtn" class="btn btn-danger" style="border-radius: 12px; width: 100%; margin-top: 10px;">
                        <i class="fas fa-user-times"></i> Deactivate Account
                    </button>
                    <button id="logoutBtn" class="btn btn-outline" style="border-radius: 12px; width: 100%; border-color: var(--text-light); color: var(--text-light);">
                        <i class="fas fa-sign-out-alt"></i> Log Out Securely
                    </button>
                </div>

                <!-- Edit Profile Modal -->
                <div id="editProfileModal" class="modal-overlay" style="display: none;">
                    <div class="modal-card">
                        <h3 style="margin-bottom: 20px;"><i class="fas fa-user-edit"></i> Edit Profile</h3>
                        <div class="input-group">
                            <label>First Name</label>
                            <input type="text" id="editFirstName">
                        </div>
                        <div class="input-group">
                            <label>Last Name</label>
                            <input type="text" id="editLastName">
                        </div>
                        <div class="input-group">
                            <label>Phone Number</label>
                            <input type="text" id="editPhone">
                        </div>
                        <div style="display: flex; gap: 10px; margin-top: 20px;">
                            <button id="saveProfileBtn" class="btn btn-primary" style="flex:1;">Save</button>
                            <button id="cancelEditBtn" class="btn btn-outline" style="flex:1;">Cancel</button>
                        </div>
                    </div>
                </div>

                <!-- USSD Simulator Modal -->
                <div id="ussdModal" class="modal-overlay" style="display: none;">
                    <div class="modal-card">
                        <h3 style="margin-bottom: 20px;"><i class="fas fa-mobile-alt"></i> USSD Simulator</h3>
                        <div class="input-group">
                            <label>Session ID</label>
                            <input type="text" id="ussdSessionId" value="12345">
                        </div>
                        <div class="input-group">
                            <label>Service Code</label>
                            <input type="text" id="ussdServiceCode" value="*384*123#">
                        </div>
                        <div class="input-group">
                            <label>Phone Number</label>
                            <input type="text" id="ussdPhone" value="08000000000">
                        </div>
                        <div class="input-group">
                            <label>Text Input</label>
                            <input type="text" id="ussdText" placeholder="Enter USSD response" value="">
                        </div>
                        <div style="background: var(--bg-light); border-radius: 12px; padding: 15px; margin-top: 15px; min-height: 50px; white-space: pre-wrap; font-family: monospace; border: 1px solid var(--border-color);" id="ussdResponse">
                            Waiting for input...
                        </div>
                        <div style="display: flex; gap: 10px; margin-top: 20px;">
                            <button id="sendUssdBtn" class="btn btn-primary" style="flex:1;">Send</button>
                            <button id="closeUssdBtn" class="btn btn-outline" style="flex:1;">Close</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <i class="fas fa-house-chimney"></i><span>Overview</span>
        </a>
        <a href="farm.html" class="nav-item">
            <i class="fas fa-tractor"></i><span>Farms</span>
        </a>
        <a href="logs.html" class="nav-item">
            <i class="fas fa-clipboard-list"></i><span>Logs</span>
        </a>
        <a href="profile.html" class="nav-item active">
            <i class="fas fa-user-circle"></i><span>Profile</span>
        </a>
    </div>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
</body>

</html>
